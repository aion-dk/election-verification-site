events {}
error_log /dev/stdout info;
http {
    include mime.types;
    sendfile on;
    access_log /dev/stdout;

    server {
        listen 8080;
        listen [::]:8080;

        resolver 127.0.0.11;
        autoindex off;

        server_name _;
        server_tokens off;

        root /usr/share/nginx/html;
        index index.html;


        gzip_static on;

        # SPA route fallback
        location / {
          try_files $uri $uri/ /index.html;
        }

        # Don't cache the HTML shell (so new deployments are picked up)
        location = /index.html {
          add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Cache static assets hard (works best with Vite hashed filenames)
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|map)$ {
          try_files $uri =404;
          add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }
}
